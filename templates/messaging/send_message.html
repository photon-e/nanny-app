{% extends "layout/base.html" %}

{% block title %}Conversation{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto">
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 md:p-8">
    <h1 class="text-2xl md:text-3xl font-bold text-soft-teal">Message {{ receiver.get_full_name|default:receiver.username }}</h1>
    <p class="text-gray-600 mt-2">Keep all communication in-platform for safety and support.</p>

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="flex flex-wrap items-center gap-3 pt-2">
        <button type="submit" class="bg-soft-teal hover:bg-teal-dark text-white px-6 py-2 rounded-lg font-semibold transition shadow">
          Send Message
        </button>
        <a href="{% url 'inbox' %}" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">
          Back to Inbox
        </a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
