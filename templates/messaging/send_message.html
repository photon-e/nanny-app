{% extends "layout/base.html" %}

{% block title %}Send Message{% endblock %}

{% block content %}
<h1>Send Message to {{ receiver.get_full_name|default:receiver.username }}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send</button>
</form>

<p><a href="{% url 'inbox' %}">Back to Inbox</a></p>
{% endblock %}
